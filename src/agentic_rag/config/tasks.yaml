retrieval_task:
  description: >
    Retrieve the most relevant evidence from the indexed knowledge base for the user query: {query}.
    Keep the original source labels and chunk references in the returned context.
  expected_output: >
    A set of relevant excerpts, each including its source label and chunk reference.
  agent: retriever_agent

response_task:
  description: >
    Answer the user query: {query} using only the retrieved evidence. Include inline source citations
    in the final answer.
  expected_output: >
    A concise answer with inline source citations. If the evidence is insufficient, say so explicitly.
  agent: response_synthesizer_agent
